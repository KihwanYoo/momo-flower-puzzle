<body>
<h1>개인정보처리방침</h1>
<p>Momo Flower Puzzle는 로컬 저장(localStorage)을 사용하여 게임 기록, 코인, 설정값을 기기에 저장할 수 있습니다.</p>
<section>
<h2>수집 정보</h2>
<p>게임 플레이 기록, 최고 점수, 설정값 등 서비스 제공에 필요한 최소한의 정보만 브라우저 내에 저장될 수 있습니다.</p>
</section>
<section>
<h2>광고</h2>
<p>본 서비스는 광고 제공을 위해 제3자 광고 서비스(예: Google AdSense)를 사용할 수 있습니다.</p>
</section>
<section>
<h2>문의</h2>
<p>추후 정식 서비스 시 운영자 연락처와 세부 정책이 업데이트될 수 있습니다.</p>
</section>
