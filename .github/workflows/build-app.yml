name: Build App (iOS + Android)

on:
  push:
    tags:
      - "v*"          # v1.0.0 태그 push 시에만 실행

jobs:
  # ══════════════════════════════════════════
  #  Android → Google Play
  # ══════════════════════════════════════════
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor-community/admob   # AdMob 광고 플러그인

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Build release APK/AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease        # Google Play용 .aab

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64:   ${{ secrets.ANDROID_SIGNING_KEY }}
          alias:              ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword:        ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Google Play (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName:                 com.yourname.momoflower
          releaseFiles:                android/app/build/outputs/bundle/release/*.aab
          track:                       internal     # internal → alpha → production 순으로 승격

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: android/app/build/outputs/bundle/release/*.aab

  # ══════════════════════════════════════════
  #  iOS → App Store (macOS runner 필요)
  # ══════════════════════════════════════════
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm install @capacitor-community/admob

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Import Code-Signing Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          p12-password:    ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Download Provisioning Profile
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id:            com.yourname.momoflower
          issuer-id:            ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id:           ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key:      ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Build & Archive (xcodebuild)
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -archivePath build/App.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="MomoFlower_AppStore" \
            | xcpretty

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ipa

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path:        build/ipa/App.ipa
          issuer-id:       ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id:      ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ipa/*.ipa
